<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ativa FIX – Sistema de gestão para assistência técnica</title>
  <meta name="description" content="Controle ordens de serviço, estoque, financeiro e clientes. Acesse o sistema ou fale conosco." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      text-align: center;
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #0f172a; }
    .sub { color: #64748b; font-size: 0.95rem; margin-bottom: 1.5rem; }
    p { color: #475569; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block;
      background: #0f172a;
      color: #fff;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #1e293b; }
    .btn.secondary { background: #e2e8f0; color: #0f172a; margin-top: 0.75rem; }
    .btn.secondary:hover { background: #cbd5e1; }
    .note { font-size: 0.8rem; color: #94a3b8; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ativa FIX</h1>
    <p class="sub">Sistema de gestão para assistência técnica</p>
    <p>Controle ordens de serviço, estoque, financeiro e clientes em um só lugar.</p>
    <a href="https://app.ativafix.com" class="btn">Acessar o sistema</a>
    <br />
    <a href="https://app.ativafix.com/login" class="btn secondary">Fazer login</a>
    <p class="note">Página de vendas e informações em construção. Use o link acima para acessar o app.</p>
  </div>
</body>
</html>
